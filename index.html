<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AramEthicAI.com — AI with Conscience</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --dark: #0a0c10;
      --deep: #0f1218;
      --mid: #1a1f2e;
      --text: #e8e4d8;
      --muted: #8a8070;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 65%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 10%, rgba(201,168,76,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 50%, rgba(255,255,255,0.1) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 40px 20px;
    }

    /* ── SVG Visual ── */
    .visual-wrap {
      position: relative;
      width: min(420px, 90vw);
      height: min(420px, 90vw);
      margin-bottom: 60px;
      animation: fadeUp 1.2s ease both;
    }

    .visual-wrap svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.2));
    }

    /* Orbit rings */
    .ring {
      fill: none;
      stroke: rgba(201,168,76,0.15);
      stroke-width: 1;
    }
    .ring-glow {
      fill: none;
      stroke: rgba(201,168,76,0.4);
      stroke-width: 1.5;
      stroke-dasharray: 60 300;
      transform-origin: 210px 210px;
    }
    .ring-glow-1 { animation: orbit 8s linear infinite; }
    .ring-glow-2 { animation: orbit 12s linear infinite reverse; stroke-dasharray: 40 240; }
    .ring-glow-3 { animation: orbit 6s linear infinite; stroke-dasharray: 80 360; }

    @keyframes orbit {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -420; }
    }

    /* Nodes */
    .node {
      fill: var(--gold);
      animation: nodePulse 3s ease-in-out infinite;
    }
    .node-2 { animation-delay: -1s; }
    .node-3 { animation-delay: -2s; }

    @keyframes nodePulse {
      0%, 100% { opacity: 0.5; r: 5; }
      50% { opacity: 1; r: 7; }
    }

    /* Brain / human silhouette at center */
    .center-glow {
      fill: radial-gradient(circle, rgba(201,168,76,0.3), transparent);
    }

    /* Connecting lines */
    .connector {
      stroke: rgba(201,168,76,0.25);
      stroke-width: 1;
      stroke-dasharray: 4 6;
      animation: dashMove 4s linear infinite;
    }
    @keyframes dashMove {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -40; }
    }

    /* ── Typography ── */
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(11px, 1.5vw, 13px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      animation: fadeUp 1.4s ease 0.3s both;
    }

    .headline {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(28px, 6vw, 64px);
      line-height: 1.1;
      text-align: center;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #e8d08a 0%, #c9a84c 50%, #f0e0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1.4s ease 0.5s both;
      margin-bottom: 10px;
    }

    .domain-accent {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(13px, 2vw, 18px);
      letter-spacing: 0.25em;
      color: var(--gold-light);
      opacity: 0.7;
      text-align: center;
      animation: fadeUp 1.4s ease 0.7s both;
      margin-bottom: 40px;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 30px;
      animation: fadeUp 1.4s ease 0.9s both;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.08em;
      font-style: italic;
      max-width: 500px;
      line-height: 1.8;
      animation: fadeUp 1.4s ease 1.1s both;
    }

    .coming-soon {
      margin-top: 50px;
      padding: 12px 36px;
      border: 1px solid rgba(201,168,76,0.3);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,168,76,0.05);
      animation: fadeUp 1.4s ease 1.3s both, borderPulse 3s ease-in-out 2s infinite;
    }

    @keyframes borderPulse {
      0%, 100% { border-color: rgba(201,168,76,0.3); box-shadow: none; }
      50% { border-color: rgba(201,168,76,0.7); box-shadow: 0 0 20px rgba(201,168,76,0.1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom gradient vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
  <div class="page">

    <!-- SVG Illustration: AI + Ethics (neural network + human silhouette) -->
    <div class="visual-wrap">
      <svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f0e0a0"/>
            <stop offset="100%" stop-color="#c9a84c"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Background center glow -->
        <circle cx="210" cy="210" r="140" fill="url(#centerGrad)"/>

        <!-- Orbit rings -->
        <circle class="ring" cx="210" cy="210" r="100"/>
        <circle class="ring" cx="210" cy="210" r="140"/>
        <circle class="ring" cx="210" cy="210" r="180"/>

        <!-- Animated ring highlights -->
        <circle class="ring-glow ring-glow-1" cx="210" cy="210" r="100"/>
        <circle class="ring-glow ring-glow-2" cx="210" cy="210" r="140"/>
        <circle class="ring-glow ring-glow-3" cx="210" cy="210" r="180"/>

        <!-- Connector lines (hub & spoke) -->
        <line class="connector" x1="210" y1="210" x2="310" y2="145"/>
        <line class="connector" x1="210" y1="210" x2="330" y2="245"/>
        <line class="connector" x1="210" y1="210" x2="280" y2="330"/>
        <line class="connector" x1="210" y1="210" x2="130" y2="330"/>
        <line class="connector" x1="210" y1="210" x2="95" y2="240"/>
        <line class="connector" x1="210" y1="210" x2="110" y2="140"/>
        <line class="connector" x1="210" y1="210" x2="190" y2="70"/>
        <line class="connector" x1="210" y1="210" x2="240" y2="380"/>

        <!-- Outer orbit nodes -->
        <circle class="node" cx="310" cy="145" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-2" cx="330" cy="245" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-3" cx="280" cy="330" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node" cx="130" cy="330" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-2" cx="95" cy="240" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-3" cx="110" cy="140" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node" cx="190" cy="70" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-2" cx="240" cy="380" r="4" fill="url(#nodeGrad)" filter="url(#glow)"/>

        <!-- Mid-ring nodes -->
        <circle class="node node-3" cx="260" cy="100" r="4" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node" cx="350" cy="190" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-2" cx="160" cy="360" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
        <circle class="node node-3" cx="70" cy="190" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>

        <!-- Human silhouette (stylized head + shoulders) -->
        <!-- Head -->
        <ellipse cx="210" cy="185" rx="28" ry="32"
          fill="none" stroke="rgba(201,168,76,0.6)" stroke-width="1.5"/>
        <!-- Neck -->
        <line x1="197" y1="217" x2="194" y2="232" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <line x1="223" y1="217" x2="226" y2="232" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <!-- Shoulders arc -->
        <path d="M 175 235 Q 210 255 245 235"
          fill="none" stroke="rgba(201,168,76,0.6)" stroke-width="1.5"/>

        <!-- Brain-circuit lines inside head -->
        <line x1="195" y1="175" x2="225" y2="175" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
        <line x1="190" y1="185" x2="230" y2="185" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
        <line x1="195" y1="195" x2="225" y2="195" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
        <line x1="210" y1="162" x2="210" y2="208" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
        <line x1="200" y1="165" x2="200" y2="205" stroke="rgba(201,168,76,0.2)" stroke-width="0.8"/>
        <line x1="220" y1="165" x2="220" y2="205" stroke="rgba(201,168,76,0.2)" stroke-width="0.8"/>

        <!-- Small circuit dots on head -->
        <circle cx="200" cy="175" r="2" fill="rgba(201,168,76,0.8)"/>
        <circle cx="220" cy="175" r="2" fill="rgba(201,168,76,0.8)"/>
        <circle cx="210" cy="185" r="2.5" fill="rgba(240,224,160,0.9)"/>
        <circle cx="195" cy="195" r="2" fill="rgba(201,168,76,0.8)"/>
        <circle cx="225" cy="195" r="2" fill="rgba(201,168,76,0.8)"/>

        <!-- Scales of justice symbol (ethics) at bottom center -->
        <line x1="210" y1="248" x2="210" y2="268" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <line x1="190" y1="258" x2="230" y2="258" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <!-- left pan -->
        <path d="M 190 258 L 183 268 L 197 268 Z"
          fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="1"/>
        <!-- right pan -->
        <path d="M 230 258 L 223 268 L 237 268 Z"
          fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="1"/>
      </svg>
    </div>

    <!-- Text content -->
    <p class="eyebrow">Artificial Intelligence &middot; Ethics &middot; Purpose</p>
    <h1 class="headline">Welcome to<br/>Aram Ethic AI</h1>
    <p class="domain-accent">AramEthicAI.com</p>
    <div class="divider"></div>
    <p class="tagline">Where conscience meets computation.<br/>Building a future where AI serves humanity with integrity.</p>
    <div class="coming-soon">Coming Soon</div>
  </div>
</body>
</html>
